# Desarrollo local: base de datos + storage S3-compatible. La app corre con `npm run dev`.
# Cumple la instrucción del ingeniero: desarrollar contra un Postgres propio
# y tener scripts de migración listos; al llegar los accesos de RDS solo
# cambia DATABASE_URL. MinIO simula R2 (mismo SDK S3) mientras llegan las
# credenciales reales de Cloudflare R2.
services:
  db:
    image: postgres:16-alpine
    container_name: bbti-db-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bbti
    ports:
      # 5434 en el host: 5432 lo ocupa un PostgreSQL nativo y 5433 la BD de otro proyecto (ventas_jg)
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/db/init-schema.sql:/docker-entrypoint-initdb.d/init-schema.sql
  minio:
    image: minio/minio
    container_name: bbti-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
volumes:
  pgdata: {}
  miniodata: {}
