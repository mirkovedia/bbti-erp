services:
  bbti-erp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bbti-erp
    restart: unless-stopped
    ports:
      - "3006:3000"
    env_file:
      - .env.production
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cron:
    build: ./docker/cron
    container_name: bbti-erp-cron
    restart: unless-stopped
    env_file:
      - .env.production
    depends_on:
      bbti-erp:
        condition: service_healthy
